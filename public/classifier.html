<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Goldenhue — Color Season Classifier</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #faf9f7;
      --surface: #ffffff;
      --border: #e8e3dc;
      --text: #1a1714;
      --muted: #8a8078;
      --accent: #c4956a;
      --radius: 12px;
      --shadow: 0 2px 16px rgba(0,0,0,0.07);

      /* Season palette swatches */
      --light-spring:   #f5c9a0;
      --true-spring:    #f4a24a;
      --bright-spring:  #7ecf6b;
      --light-summer:   #b8d4e8;
      --true-summer:    #7a9bb5;
      --soft-summer:    #a89eb4;
      --soft-autumn:    #c4a882;
      --true-autumn:    #b5652a;
      --deep-autumn:    #6b3a1f;
      --deep-winter:    #1a2640;
      --true-winter:    #2c4fa3;
      --bright-winter:  #d42e8c;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 40px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }
    header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    header h1 span { color: var(--accent); }
    header p {
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .container {
      max-width: 780px;
      margin: 0 auto;
      display: grid;
      gap: 20px;
    }

    /* Input card */
    .input-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
    }

    .url-row {
      display: flex;
      gap: 10px;
    }

    input[type="url"] {
      flex: 1;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.9rem;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="url"]:focus { border-color: var(--accent); }
    input[type="url"]::placeholder { color: var(--muted); }

    button#classify-btn {
      padding: 11px 22px;
      background: var(--text);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
    }
    button#classify-btn:hover { opacity: 0.82; }
    button#classify-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .hint {
      margin-top: 10px;
      font-size: 0.78rem;
      color: var(--muted);
    }

    /* History list */
    .history { display: grid; gap: 16px; }

    /* Result card */
    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: grid;
      grid-template-columns: 140px 1fr;
      animation: slideIn 0.2s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-image {
      width: 140px;
      min-height: 140px;
      object-fit: cover;
      display: block;
      background: var(--border);
      flex-shrink: 0;
    }
    .result-image.broken { opacity: 0.3; }

    .result-body {
      padding: 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .season-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .season-swatch {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 1.5px solid rgba(0,0,0,0.08);
    }

    .season-name {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .confidence-badge {
      padding: 2px 9px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .confidence-badge.high   { background: #e6f4ea; color: #2d7a3a; }
    .confidence-badge.medium { background: #fef8e6; color: #8a6500; }
    .confidence-badge.low    { background: #fdecea; color: #a33020; }

    .colors-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .color-chip {
      padding: 3px 10px;
      border-radius: 20px;
      background: var(--bg);
      border: 1px solid var(--border);
      font-size: 0.78rem;
      color: var(--muted);
    }

    .reasoning {
      font-size: 0.83rem;
      color: var(--muted);
      line-height: 1.55;
    }

    .result-url {
      font-size: 0.72rem;
      color: var(--border);
      word-break: break-all;
      margin-top: 2px;
    }

    /* Loading state */
    .loading-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 24px;
      text-align: center;
      color: var(--muted);
      font-size: 0.88rem;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.5; }
    }

    /* Error state */
    .error-card {
      background: #fdecea;
      border: 1px solid #f5c0bb;
      border-radius: var(--radius);
      padding: 16px 20px;
      font-size: 0.85rem;
      color: #a33020;
    }

    @media (max-width: 520px) {
      .result-card { grid-template-columns: 100px 1fr; }
      .result-image { width: 100px; min-height: 100px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Golden<span>hue</span></h1>
    <p>Paste a product image URL to classify its color season</p>
  </header>

  <div class="container">
    <div class="input-card">
      <div class="url-row">
        <input type="url" id="url-input" placeholder="https://example.com/product-image.jpg" autocomplete="off" />
        <button id="classify-btn">Classify</button>
      </div>
      <p class="hint">Paste any publicly accessible product image URL. Results appear below.</p>
    </div>

    <div class="history" id="history"></div>
  </div>

  <script>
    const SEASON_COLORS = {
      "Light Spring":   "var(--light-spring)",
      "True Spring":    "var(--true-spring)",
      "Bright Spring":  "var(--bright-spring)",
      "Light Summer":   "var(--light-summer)",
      "True Summer":    "var(--true-summer)",
      "Soft Summer":    "var(--soft-summer)",
      "Soft Autumn":    "var(--soft-autumn)",
      "True Autumn":    "var(--true-autumn)",
      "Deep Autumn":    "var(--deep-autumn)",
      "Deep Winter":    "var(--deep-winter)",
      "True Winter":    "var(--true-winter)",
      "Bright Winter":  "var(--bright-winter)",
    };

    const input = document.getElementById("url-input");
    const btn   = document.getElementById("classify-btn");
    const history = document.getElementById("history");

    async function classify() {
      const url = input.value.trim();
      if (!url) return;

      btn.disabled = true;
      input.disabled = true;

      // Insert loading placeholder at top
      const placeholder = document.createElement("div");
      placeholder.className = "loading-card";
      placeholder.textContent = "Analyzing colors…";
      history.prepend(placeholder);

      try {
        const res = await fetch("/api/classify", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url }),
        });
        const data = await res.json();

        if (!res.ok) throw new Error(data.error ?? "Unknown error");

        placeholder.replaceWith(buildResultCard(url, data));
        input.value = "";
      } catch (err) {
        const errCard = document.createElement("div");
        errCard.className = "error-card";
        errCard.textContent = `Error: ${err.message}`;
        placeholder.replaceWith(errCard);
      } finally {
        btn.disabled = false;
        input.disabled = false;
        input.focus();
      }
    }

    function buildResultCard(url, data) {
      const card = document.createElement("div");
      card.className = "result-card";

      // Image
      const img = document.createElement("img");
      img.className = "result-image";
      img.src = url;
      img.alt = data.best_season;
      img.onerror = () => img.classList.add("broken");
      card.appendChild(img);

      // Body
      const body = document.createElement("div");
      body.className = "result-body";

      // Season row
      const seasonRow = document.createElement("div");
      seasonRow.className = "season-row";

      const swatch = document.createElement("div");
      swatch.className = "season-swatch";
      swatch.style.background = SEASON_COLORS[data.best_season] ?? "#ccc";

      const name = document.createElement("span");
      name.className = "season-name";
      name.textContent = data.best_season;

      const badge = document.createElement("span");
      badge.className = `confidence-badge ${data.confidence}`;
      badge.textContent = data.confidence;

      seasonRow.append(swatch, name, badge);
      body.appendChild(seasonRow);

      // Dominant colors
      if (data.dominant_colors?.length) {
        const colorsRow = document.createElement("div");
        colorsRow.className = "colors-row";
        data.dominant_colors.forEach(c => {
          const chip = document.createElement("span");
          chip.className = "color-chip";
          chip.textContent = c;
          colorsRow.appendChild(chip);
        });
        body.appendChild(colorsRow);
      }

      // Reasoning
      const reasoning = document.createElement("p");
      reasoning.className = "reasoning";
      reasoning.textContent = data.reasoning;
      body.appendChild(reasoning);

      // URL (subtle)
      const urlEl = document.createElement("p");
      urlEl.className = "result-url";
      urlEl.textContent = url;
      body.appendChild(urlEl);

      card.appendChild(body);
      return card;
    }

    btn.addEventListener("click", classify);
    input.addEventListener("keydown", e => { if (e.key === "Enter") classify(); });

    // Auto-classify on paste if input is empty beforehand
    input.addEventListener("paste", () => {
      setTimeout(() => { if (input.value.trim().startsWith("http")) classify(); }, 50);
    });
  </script>
</body>
</html>
